<!DOCTYPE html>
<html>
<body>
<input type="file" id="f" accept="video/*"><br><br>
<button onclick="test()">Качи тест</button>
<div id="r"></div>
<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_ANON);

async function test() {
  var file = document.getElementById('f').files[0];
  if (!file) { document.getElementById('r').textContent = 'Избери файл!'; return; }
  document.getElementById('r').textContent = 'Вземам токен...';
  
  var token = '';
  try {
    var s = await sb.auth.getSession();
    if (s.data && s.data.session) token = s.data.session.access_token;
  } catch(e) {}
  
  document.getElementById('r').textContent = 'Токен: ' + (token ? token.substring(0,20)+'...' : 'НЯМА');
  if (!token) return;
  
  document.getElementById('r').textContent = 'Качване...';
  try {
    var fd = new FormData();
    fd.append('video', file, file.name);
    fd.append('title', 'Тест');
    fd.append('token', token);
    var resp = await fetch(CONFIG.BACKEND + '/upload', { method: 'POST', body: fd });
    var data = await resp.json();
    document.getElementById('r').textContent = 'Статус: ' + resp.status + ' | ' + JSON.stringify(data);
  } catch(e) {
    document.getElementById('r').textContent = 'ГРЕШКА: ' + e.message;
  }
}
</script>
</body>
</html>
