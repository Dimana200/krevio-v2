<button onclick="test()">Тест POST</button>
<div id="r"></div>
<script>
async function test() {
  document.getElementById('r').textContent = 'Изпращане...';
  try {
    var fd = new FormData();
    fd.append('test', 'hello');
    var resp = await fetch('https://krevio-backend-production.up.railway.app/upload', {
      method: 'POST', body: fd
    });
    document.getElementById('r').textContent = 'OK: ' + resp.status;
  } catch(e) {
    document.getElementById('r').textContent = 'ГРЕШКА: ' + e.message;
  }
}
</script>
