<!DOCTYPE html>
<html>
<body>
<div id="status" style="padding:10px;background:#222;color:gold">Зарежда...</div>
<br>
<input type="file" id="upl-inp" accept="video/*" style="display:none">
<div id="upl-dz" style="padding:20px;border:1px solid gold;cursor:pointer;display:none">Натисни за файл</div>
<div id="upl-fi" style="display:none;padding:10px;background:#111;color:#fff">
  <span id="upl-fi-name"></span> 
  <span id="upl-fi-size"></span>
  <button id="upl-fi-rm">X</button>
</div>
<input type="text" id="upl-title" value="Тест" style="display:block;margin:10px 0;padding:8px">
<textarea id="upl-desc" style="display:block;margin:10px 0;padding:8px"></textarea>
<div id="upl-act">
  <button id="upl-go-btn" style="padding:12px 24px;background:gold;border:none;font-weight:bold">Публикувай</button>
  <button id="upl-cancel-btn">Откажи</button>
</div>
<div id="upl-prog" style="display:none">
  <div id="upl-pct">0%</div>
  <div style="background:#333;height:8px"><div id="upl-bar" style="background:gold;height:100%;width:0"></div></div>
</div>
<div id="upl-suc" style="display:none;color:gold;font-size:1.2rem">✅ Качено!</div>
<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;display:none"></div>
<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
function openModal(){}
function closeModal(){}
function renderFeed(){}
function resetFeed(){}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 4000);
}

STATE.uploadAccess = 'free';
STATE.sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_ANON);

// Изчакай сесията преди всичко
STATE.sb.auth.getSession().then(function(s) {
  if (s.data && s.data.session) {
    STATE.user = { id: s.data.session.user.id, email: s.data.session.user.email };
    STATE._token = s.data.session.access_token;
    document.getElementById('status').textContent = '✅ Влязъл си като: ' + STATE.user.email;
    document.getElementById('upl-dz').style.display = 'block';
  } else {
    document.getElementById('status').textContent = '❌ НЕ СИ ВЛЯЗЪЛ — влез в Krevio първо';
  }
});
</script>
<script src="js/upload.js"></script>
<script>
bindUpload();
</script>
</body>
</html>
